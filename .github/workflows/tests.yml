name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fastqc bwa samtools bcftools fastp tabix

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v --tb=short

      - name: Generate synthetic test data
        run: python tools/generate_test_data.py data

      - name: Run end-to-end single-sample pipeline
        run: |
          ngs-pipeline run --config config/sample_config.yaml --output results/ci_run

      - name: Run end-to-end batch pipeline
        run: |
          ngs-pipeline run-batch --config config/batch_config.yaml --sample-sheet config/sample_sheet_example.csv --output results/ci_batch

      - name: Run test coverage
        run: pytest tests/ --cov=pipeline --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
